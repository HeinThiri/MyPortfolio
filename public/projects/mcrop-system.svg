<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Mcrop system">
  <defs>
    <linearGradient id="mc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf1f6"/>
      <stop offset="0.5" stop-color="#e7ecf3"/>
      <stop offset="1" stop-color="#f4ecdf"/>
    </linearGradient>
    <linearGradient id="mc-bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#8fb3e0"/>
      <stop offset="1" stop-color="#a9dce3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#mc-bg)"/>
  <!-- dashboard panels -->
  <rect x="170" y="130" width="240" height="110" rx="14" fill="#ffffff" stroke="#7e9cc9" stroke-opacity="0.3"/>
  <rect x="430" y="130" width="200" height="110" rx="14" fill="#ffffff" stroke="#7e9cc9" stroke-opacity="0.3"/>
  <rect x="170" y="260" width="460" height="110" rx="14" fill="#ffffff" stroke="#7e9cc9" stroke-opacity="0.3"/>
  <!-- donut -->
  <g transform="translate(230 185)">
    <circle r="34" fill="none" stroke="#dfe7f2" stroke-width="12"/>
    <circle r="34" fill="none" stroke="#7e9cc9" stroke-width="12" stroke-dasharray="150 214" stroke-linecap="round" transform="rotate(-90)"/>
  </g>
  <g fill="#cdddf1">
    <rect x="290" y="160" width="100" height="12" rx="6"/>
    <rect x="290" y="184" width="76" height="12" rx="6"/>
    <rect x="290" y="208" width="90" height="12" rx="6"/>
  </g>
  <!-- mini bars -->
  <g fill="url(#mc-bar)">
    <rect x="455" y="195" width="22" height="30" rx="6"/>
    <rect x="487" y="175" width="22" height="50" rx="6"/>
    <rect x="519" y="155" width="22" height="70" rx="6"/>
    <rect x="551" y="185" width="22" height="40" rx="6"/>
  </g>
  <!-- line chart -->
  <polyline points="200,340 280,300 360,322 440,280 520,300 600,262" fill="none" stroke="#7e9cc9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
