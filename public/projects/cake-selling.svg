<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Cake selling system">
  <defs>
    <linearGradient id="ck-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5efe6"/>
      <stop offset="0.5" stop-color="#efe7da"/>
      <stop offset="1" stop-color="#e9eef5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#ck-bg)"/>
  <!-- candle flame -->
  <path d="M400 96 C 388 112, 412 116, 400 132 C 392 120, 408 116, 400 96 Z" fill="#e7a23a"/>
  <rect x="396" y="132" width="8" height="34" rx="3" fill="#ffffff" stroke="#d8b46a"/>
  <!-- cake layers -->
  <path d="M300 200 q100 -38 200 0 v40 q-100 38 -200 0 Z" fill="#ffffff" stroke="#d8b46a" stroke-width="2"/>
  <rect x="296" y="244" width="208" height="56" rx="12" fill="#f3d9c6"/>
  <rect x="288" y="298" width="224" height="64" rx="14" fill="#ffffff" stroke="#d8b46a" stroke-width="2"/>
  <path d="M300 250 q26 22 52 0 q26 22 52 0 q26 22 52 0" fill="none" stroke="#e7b3b0" stroke-width="6" stroke-linecap="round"/>
  <!-- cart -->
  <g transform="translate(556 340)" fill="none" stroke="#7e9cc9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 0 H10 L20 44 H64 L74 12 H16"/>
    <circle cx="26" cy="60" r="6" fill="#7e9cc9"/>
    <circle cx="58" cy="60" r="6" fill="#7e9cc9"/>
  </g>
</svg>
